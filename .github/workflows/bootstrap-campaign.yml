name: Install complete EY candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-campaign.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract campaign source
        run: python tools/bootstrap_campaign.py
      - name: Install document toolchain
        run: python -m pip install --disable-pip-version-check weasyprint==68.0 pillow==12.2.0 pypdf==5.9.0
      - name: Materialize official assets and PDFs
        run: python tools/materialize.py
      - name: Commit complete campaign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete EY physical AI candidate campaign"
          git push
