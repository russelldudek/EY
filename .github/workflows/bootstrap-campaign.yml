name: Install complete EY candidate campaign

on:
  pull_request:
    branches: [main]
    paths:
      - 'publish-trigger.txt'
      - 'tools/bootstrap_campaign.py'
      - 'tools/source_payload/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ey-campaign-bootstrap-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and extract campaign source
        run: python tools/bootstrap_campaign.py
      - name: Install document toolchain
        run: python -m pip install --disable-pip-version-check weasyprint==68.0 pillow==12.2.0 pypdf==5.9.0
      - name: Materialize official assets and PDFs
        run: python tools/materialize.py
      - name: Commit complete campaign to publication branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Campaign is already materialized."
            exit 0
          fi
          git commit -m "Publish complete EY physical AI candidate campaign"
          git push origin "HEAD:${HEAD_REF}"
